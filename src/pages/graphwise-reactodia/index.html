<!DOCTYPE html>
<html dir="ltr" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0"/>
  <title>graphwise-reactodia</title>

  <script type="module" src="/build/graphwise-reactodia.esm.js"></script>
  <script nomodule src="/build/graphwise-reactodia.js"></script>
  <script src="./main.js" defer></script>

  <style>
    body {
      margin: 0;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 8px;
    }

    /* Reactodia fills its container, so the host needs an explicit size. */
    graphwise-reactodia {
      display: block;
      width: 100vw;
      height: calc(100vh - 50px);
    }
  </style>
</head>
<body>
<div class="toolbar">
  <button data-test="set-query-function" onclick="setQueryFunction()">Set query function</button>
  <button data-test="set-repository" onclick="setRepository('repo-a')">Set repository</button>
  <button data-test="switch-repository" onclick="setRepository('repo-b')">Switch repository</button>
  <button data-test="set-language-en" onclick="setLanguage('en')">English</button>
  <button data-test="set-language-fr" onclick="setLanguage('fr')">Français</button>
</div>

<graphwise-reactodia data-test="reactodia"></graphwise-reactodia>
</body>
</html>
